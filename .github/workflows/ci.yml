name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Preflight that sets `docs_only=true` when every changed path is under
  # top-level `docs/`. Downstream jobs gate on this via `if:` so they're
  # reported as skipped on docs-only PRs. Skipped required checks in
  # branch protection DO block merges, so point branch protection at the
  # aggregate `CI` job at the bottom of this file instead of individual
  # jobs — `CI` always runs and treats skipped needs as success.
  # `packages/website/docs` does not qualify; it lives under
  # `packages/website/` and affects the site build.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # First push to a branch has a zero-SHA base; force-push may
          # rewrite history out from under us. In either case we can't
          # reliably compute a diff — fall back to running the full matrix.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files=$(git diff --name-only "$base" "$head" 2>/dev/null); then
            echo "git diff failed (base may be unreachable after force-push) — running full matrix"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Changed files:"
          echo "$files"
          if [ -z "$files" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Any line that does NOT start with `docs/` flips the switch.
          if echo "$files" | grep -qv '^docs/'; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-typecheck:
    name: Build & Type Check
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  guides-typecheck:
    name: Guides Code Type Check
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm guides:typecheck

  dx-type-tests:
    name: DX Type Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:types

  virtualized-dx-type-tests:
    name: Virtualized DX Type Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:types:virtualized

  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >
          pnpm vitest run
          packages/arel
          packages/activemodel
          packages/activesupport
          packages/rack
          packages/actionpack
          packages/actionview
          packages/trailties
          scripts/guides-typecheck

  sqlite-tests:
    name: SQLite Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run --no-file-parallelism packages/activerecord

  postgres-tests:
    name: PostgreSQL Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: rails_js_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run --no-file-parallelism packages/activerecord
        env:
          PG_TEST_URL: postgres://postgres:postgres@localhost:5432/rails_js_test

  mariadb-tests:
    name: MariaDB Tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: rails_js_test
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Set MariaDB to case-sensitive collation
        run: |
          mysql -h 127.0.0.1 -u root -e "ALTER DATABASE rails_js_test CHARACTER SET utf8mb4 COLLATE utf8mb4_bin;"
      - run: pnpm vitest run --no-file-parallelism packages/activerecord
        env:
          MYSQL_TEST_URL: mysql://root@localhost:3306/rails_js_test

  website:
    name: Website
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @blazetrails/website exec svelte-kit sync
      - name: Build SvelteKit
        run: pnpm --filter @blazetrails/website run build:sw && pnpm --filter @blazetrails/website exec vite build
      - name: Build docs (typedoc + VitePress)
        run: pnpm --filter @blazetrails/website run docs:build

  rails-comparison:
    name: Rails API/Test Comparison
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Fetch Rails source
        run: bash scripts/api-compare/fetch-rails.sh
      - name: Fetch Rails test source + Rack
        run: bash scripts/test-compare/fetch-rails-tests.sh
      - name: Extract Ruby API
        run: cd scripts/api-compare && ruby extract-ruby-api.rb
      - name: Extract Ruby tests
        run: cd scripts/test-compare && ruby extract-ruby-tests.rb
      - name: API comparison
        run: pnpm exec tsx scripts/api-compare/extract-ts-api.ts && pnpm exec tsx scripts/api-compare/compare.ts
      - name: API comparison (privates)
        run: pnpm exec tsx scripts/api-compare/compare.ts --privates
      - name: Dependency lint
        run: pnpm exec tsx scripts/api-compare/lint-deps.ts
      - name: Test comparison
        run: pnpm exec tsx scripts/test-compare/extract-ts-tests.ts && pnpm exec tsx scripts/test-compare/test-compare.ts

  ci:
    name: CI
    if: ${{ always() }}
    needs:
      - changes
      - build-and-typecheck
      - lint
      - prettier
      - guides-typecheck
      - dx-type-tests
      - virtualized-dx-type-tests
      - unit-tests
      - sqlite-tests
      - postgres-tests
      - mariadb-tests
      - website
      - rails-comparison
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON"
          bad=$(echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | .key')
          if [ -n "$bad" ]; then
            echo "Failed/cancelled jobs:"
            echo "$bad"
            exit 1
          fi
          echo "All jobs passed or were intentionally skipped."
