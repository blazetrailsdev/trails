name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Labels opt in specific suites without needing a new commit:
    #   run-parity-sqlite   — schema + query parity (SQLite fixtures)
    #   run-parity-postgres — Postgres-specific parity (future)
    #   run-parity-mysql    — MySQL/MariaDB-specific parity (future)
    #   website             — force the Website build on a PR that doesn't
    #                         touch packages/website/
    #   release             — implies `website` (release PRs need the site
    #                         built); reserve other release-only suites here
    types: [opened, synchronize, reopened, labeled]
  schedule:
    # Weekly post-merge sweep so slow regressions can't hide between
    # parity-relevant PRs. Monday 06:00 UTC is off-peak on an Ubuntu runner.
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Cancel superseded runs on PR pushes; keep main/schedule runs intact so
# post-merge sweeps and timing reports aren't lost.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Preflight that sets `docs_only=true` when every changed path is under
  # top-level `docs/` or is the top-level `README.md`. Downstream jobs gate on this via `if:` so they're
  # reported as skipped on docs-only PRs. Skipped required checks in
  # branch protection DO block merges, so point branch protection at the
  # aggregate `CI` job at the bottom of this file instead of individual
  # jobs — `CI` always runs and treats skipped needs as success.
  # `packages/website/docs` does not qualify; it lives under
  # `packages/website/` and affects the site build.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
      activerecord_affected: ${{ steps.filter.outputs.activerecord_affected }}
      actionpack_affected: ${{ steps.filter.outputs.actionpack_affected }}
      actionview_affected: ${{ steps.filter.outputs.actionview_affected }}
      rack_affected: ${{ steps.filter.outputs.rack_affected }}
      trailties_affected: ${{ steps.filter.outputs.trailties_affected }}
      trails_tsc_affected: ${{ steps.filter.outputs.trails_tsc_affected }}
      tse_compiler_affected: ${{ steps.filter.outputs.tse_compiler_affected }}
      unit_tests_affected: ${{ steps.filter.outputs.unit_tests_affected }}
      guides_affected: ${{ steps.filter.outputs.guides_affected }}
      website_affected: ${{ steps.filter.outputs.website_affected }}
      website_label: ${{ steps.filter.outputs.website_label }}
      parity_sqlite: ${{ steps.filter.outputs.parity_sqlite }}
      parity_postgres: ${{ steps.filter.outputs.parity_postgres }}
      parity_mysql: ${{ steps.filter.outputs.parity_mysql }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          # Labels live on the PR even when the firing event is `labeled`,
          # `synchronize`, etc., so we can scan them uniformly.
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # First push to a branch has a zero-SHA base; force-push may
          # rewrite history out from under us. In either case we can't
          # reliably compute a diff — fall back to running the full matrix.
          # activerecord_affected gates the three AR test jobs (sqlite,
          # postgres, mariadb). True when changes touch activerecord, its
          # runtime deps (arel/activemodel/activesupport/globalid), or any
          # cross-cutting file (lockfile, root tsconfig, vitest config,
          # shared scripts, this workflow). Push to main / schedule /
          # workflow_dispatch always force true. Pattern mirrors the
          # AR-touching set in scripts/parity/run.ts.
          # Cross-cutting paths force every per-package gate true. Anything
          # here affects all packages: workspace topology, root tooling
          # config, shared scripts, this workflow, composite actions.
          INFRA_RE='^(pnpm-lock\.yaml$|pnpm-workspace\.yaml$|package\.json$|tsconfig[^/]*\.json$|vitest[^/]*\.config\.ts$|scripts/|\.github/workflows/ci\.yml$|\.github/actions/)'
          # AR workspace deps: arel/activemodel/activesupport/globalid/
          # did-you-mean (per packages/activerecord/package.json). Also
          # consumes @blazetrails/trails-tsc at runtime via the tsc-wrapper
          # CLI + type-virtualization modules (see packages/activerecord/src/
          # tsc-wrapper, schema-columns-dump.test.ts), so trails-tsc changes
          # can fail AR vitest suites — include it in the gate.
          AR_PKGS_RE='^packages/(activerecord|arel|activemodel|activesupport|globalid|did-you-mean|trails-tsc)/'
          # actionpack_affected gates actionpack-tests. True for actionpack +
          # its runtime deps (actionview/activemodel/activesupport/rack/did-you-mean).
          AP_PKGS_RE='^packages/(actionpack|actionview|activemodel|activesupport|rack|did-you-mean)/'
          # actionview_affected gates actionview-tests. ActionView's only
          # workspace dependency is activesupport (see actionview/package.json).
          AV_PKGS_RE='^packages/(actionview|activesupport)/'
          # trailties_affected gates trailties-tests. Trailties consumes
          # actionpack/actionview/activerecord/rack/activesupport, so any of
          # their workspace upstreams also flips this on.
          TRAILTIES_PKGS_RE='^packages/(trailties|actionpack|actionview|activerecord|arel|activemodel|activesupport|globalid|rack|did-you-mean|trails-tsc)/'
          # trails_tsc_affected gates the virtualized DX type tests.
          # Workspace consumers of @blazetrails/trails-tsc today: activerecord
          # (tsc-wrapper + type-virtualization) and scripts/guides-typecheck;
          # AR consumption is the reason trails-tsc is also in AR_PKGS_RE.
          TRAILS_TSC_PKGS_RE='^packages/trails-tsc/'
          # tse_compiler_affected gates tse-compiler-tests. The package has
          # no workspace dependencies today (no activesupport import), so
          # the gate matches the package path only.
          TSE_COMPILER_PKGS_RE='^packages/tse-compiler/'
          # rack_affected gates rack-tests (split out of unit-tests so a
          # rack-only PR doesn't drag in arel/activemodel/activesupport
          # tests). Rack's only workspace dependency is activesupport.
          RACK_PKGS_RE='^packages/(rack|activesupport)/'
          # unit_tests_affected gates the bundled vitest run for the small
          # leaf packages (arel/activemodel/activesupport) and the
          # scripts/guides-typecheck self-test. Rack is excluded here — it
          # has its own job above.
          UNIT_TESTS_PKGS_RE='^packages/(arel|activemodel|activesupport)/'
          # guides_affected gates the Guides Code Type Check job, which
          # compiles fenced TS blocks in packages/website/docs/guides/**.
          # Today guides only import @blazetrails/activerecord,
          # @blazetrails/activemodel, and @blazetrails/activesupport — plus
          # AR's transitive type deps. Confirmed via:
          #   grep -rhE "from ['\"]@blazetrails/[a-z-]+" packages/website/docs/guides
          GUIDES_PKGS_RE='^(packages/(activerecord|activemodel|activesupport|arel|globalid|did-you-mean|trails-tsc)/|packages/website/docs/guides/)'
          # website_affected gates the Website build (SvelteKit + typedoc +
          # VitePress). Scoped narrowly to packages/website/ — package-source
          # changes alone don't trigger it. To run the site build on a PR
          # that touches package sources, apply the `website` label (or the
          # `release` label, which always runs it). The job is also
          # exercised post-merge by push-to-main.
          WEBSITE_PKGS_RE='^packages/website/'
          force_all_affected() {
            echo "activerecord_affected=true" >> "$GITHUB_OUTPUT"
            echo "actionpack_affected=true"   >> "$GITHUB_OUTPUT"
            echo "actionview_affected=true"   >> "$GITHUB_OUTPUT"
            echo "rack_affected=true"         >> "$GITHUB_OUTPUT"
            echo "trailties_affected=true"    >> "$GITHUB_OUTPUT"
            echo "trails_tsc_affected=true"   >> "$GITHUB_OUTPUT"
            echo "tse_compiler_affected=true" >> "$GITHUB_OUTPUT"
            echo "unit_tests_affected=true"   >> "$GITHUB_OUTPUT"
            echo "guides_affected=true"       >> "$GITHUB_OUTPUT"
            echo "website_affected=true"      >> "$GITHUB_OUTPUT"
          }

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            force_all_affected
          # Triple-dot: diff against the merge-base of $base and $head, not
          # against the current tip of the base branch. Using `$base $head`
          # would also include every commit merged to main since this branch
          # diverged, inflating the changed-files list with unrelated paths
          # and triggering gates that shouldn't fire.
          elif ! files=$(git diff --name-only "$base"..."$head" 2>/dev/null); then
            echo "git diff failed (base may be unreachable after force-push) — running full matrix"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            force_all_affected
          else
            echo "Changed files:"
            echo "$files"
            # docs_only: any line NOT under `docs/` and not the top-level
            # `README.md` flips the switch. README is markdown-only and
            # only ever runs through prettier, so it doesn't need the
            # full matrix.
            if [ -z "$files" ]; then
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
            elif echo "$files" | grep -qvE '^docs/|^README\.md$|^CLAUDE\.md$'; then
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
            else
              echo "docs_only=true" >> "$GITHUB_OUTPUT"
            fi
            # On push to main / schedule / workflow_dispatch force every
            # package gate true. Downstream jobs still honor docs_only, so a
            # docs-only push to main still short-circuits the matrix.
            case "${{ github.event_name }}" in
              push|schedule|workflow_dispatch)
                force_all_affected
                ;;
              *)
                if [ -z "$files" ]; then
                  echo "activerecord_affected=false" >> "$GITHUB_OUTPUT"
                  echo "actionpack_affected=false"   >> "$GITHUB_OUTPUT"
                  echo "actionview_affected=false"   >> "$GITHUB_OUTPUT"
                  echo "rack_affected=false"         >> "$GITHUB_OUTPUT"
                  echo "trailties_affected=false"    >> "$GITHUB_OUTPUT"
                  echo "trails_tsc_affected=false"   >> "$GITHUB_OUTPUT"
                  echo "tse_compiler_affected=false" >> "$GITHUB_OUTPUT"
                  echo "unit_tests_affected=false"   >> "$GITHUB_OUTPUT"
                  echo "guides_affected=false"       >> "$GITHUB_OUTPUT"
                  echo "website_affected=false"      >> "$GITHUB_OUTPUT"
                else
                  set_gate() {
                    local name="$1" re="$2"
                    if echo "$files" | grep -qE "$INFRA_RE|$re"; then
                      echo "${name}=true"  >> "$GITHUB_OUTPUT"
                    else
                      echo "${name}=false" >> "$GITHUB_OUTPUT"
                    fi
                  }
                  set_gate activerecord_affected "$AR_PKGS_RE"
                  set_gate actionpack_affected   "$AP_PKGS_RE"
                  set_gate actionview_affected   "$AV_PKGS_RE"
                  set_gate rack_affected         "$RACK_PKGS_RE"
                  set_gate trailties_affected    "$TRAILTIES_PKGS_RE"
                  set_gate trails_tsc_affected   "$TRAILS_TSC_PKGS_RE"
                  set_gate tse_compiler_affected "$TSE_COMPILER_PKGS_RE"
                  set_gate unit_tests_affected   "$UNIT_TESTS_PKGS_RE"
                  set_gate guides_affected       "$GUIDES_PKGS_RE"
                  set_gate website_affected      "$WEBSITE_PKGS_RE"
                fi
                ;;
            esac
          fi
          # Website label opt-in. The Website job otherwise gates only on
          # packages/website/ paths, so PRs that need a site preview (or
          # release PRs that must build the production site) can apply the
          # `website` or `release` label to force the job on.
          case "${{ github.event_name }}" in
            pull_request)
              if echo "$PR_LABELS" | jq -e 'any(.[]; .name == "website" or .name == "release")' >/dev/null; then
                echo "website_label=true"  >> "$GITHUB_OUTPUT"
              else
                echo "website_label=false" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "website_label=false" >> "$GITHUB_OUTPUT"
              ;;
          esac
          # Per-adapter parity gates. Each suite is expensive (~15-20 CI
          # minutes across 7 jobs), so plain PRs skip all parity. Run on:
          #   - push to main / schedule / workflow_dispatch → all adapters
          #   - PRs carrying a per-adapter label → only that adapter
          # `any(.[]; ...)` guards against the `.[].name == "..."` bug where
          # jq -e bases exit status on the last element of a stream.
          case "${{ github.event_name }}" in
            schedule|workflow_dispatch)
              echo "parity_sqlite=true"   >> "$GITHUB_OUTPUT"
              echo "parity_postgres=true" >> "$GITHUB_OUTPUT"
              echo "parity_mysql=true"    >> "$GITHUB_OUTPUT"
              ;;
            pull_request)
              for adapter in sqlite postgres mysql; do
                label="run-parity-${adapter}"
                if echo "$PR_LABELS" | jq -e --arg l "$label" 'any(.[]; .name == $l)' >/dev/null; then
                  echo "parity_${adapter}=true"  >> "$GITHUB_OUTPUT"
                else
                  echo "parity_${adapter}=false" >> "$GITHUB_OUTPUT"
                fi
              done
              ;;
            *)
              echo "parity_sqlite=false"   >> "$GITHUB_OUTPUT"
              echo "parity_postgres=false" >> "$GITHUB_OUTPUT"
              echo "parity_mysql=false"    >> "$GITHUB_OUTPUT"
              ;;
          esac

  # `vars.RUNNER` is a single runner label (e.g. `self-hosted` or
  # `ubuntu-latest`). GitHub treats `runs-on:` as one literal label when given
  # a string, so a comma-separated value like `self-hosted,Linux,X64` will
  # NOT match any runner. If a multi-label selector is ever needed, switch
  # this expression to `fromJSON(vars.RUNNER)` and store the variable as a
  # JSON array. Today the plan is to set it to exactly `self-hosted`.
  build-and-typecheck:
    name: Build & Type Check
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
  prettier:
    name: Prettier
    needs: changes
    # Prettier doesn't need the workspace installed. Skip `pnpm install`
    # entirely and run prettier directly via `npx`. The version below MUST
    # equal the exact pin in root `package.json` devDependencies; the
    # `prettier` entry there is intentionally pinned (no `^`) so CI and
    # local `pnpm format` can never drift.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npx --yes prettier@3.8.1 --check .

  guides-typecheck:
    name: Guides Code Type Check
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.guides_affected == 'true'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm guides:typecheck

  dx-type-tests:
    name: DX Type Tests
    needs: changes
    # vitest.dx-tests.config.ts only declares activerecord and trailties
    # projects, so skip when neither is affected.
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      (needs.changes.outputs.activerecord_affected == 'true' ||
       needs.changes.outputs.trailties_affected == 'true')
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:types

  virtualized-dx-type-tests:
    name: Virtualized DX Type Tests
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      (needs.changes.outputs.activerecord_affected == 'true' ||
       needs.changes.outputs.trails_tsc_affected == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:types:virtualized

  unit-tests:
    name: Unit Tests
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.unit_tests_affected == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: >
          pnpm vitest run
          packages/arel
          packages/activemodel
          packages/activesupport
          scripts/guides-typecheck

  rack-tests:
    name: Rack Tests
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.rack_affected == 'true'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run packages/rack

  actionpack-tests:
    name: Action Pack Tests
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.actionpack_affected == 'true'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run packages/actionpack

  actionview-tests:
    name: Action View Tests
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.actionview_affected == 'true'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run packages/actionview

  trailties-tests:
    name: Trailties Tests
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.trailties_affected == 'true'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run packages/trailties

  tse-compiler-tests:
    name: TSE Compiler Tests
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.tse_compiler_affected == 'true'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run packages/tse-compiler

  sqlite-tests:
    name: SQLite Tests
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.activerecord_affected == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run packages/activerecord

  postgres-tests:
    name: PostgreSQL Tests
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.activerecord_affected == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: rails_js_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create parallel test databases
        run: |
          for i in 2 3 4; do
            PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE rails_js_test_$i;"
          done
      - run: pnpm vitest run packages/activerecord
        env:
          PG_TEST_URL: postgres://postgres:postgres@localhost:5432/rails_js_test
          AR_DB_FORKS: 4

  mariadb-tests:
    name: MariaDB Tests
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.activerecord_affected == 'true'
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: rails_js_test
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create parallel test databases
        run: |
          for i in 2 3 4; do
            mysql -h 127.0.0.1 -u root -e "CREATE DATABASE rails_js_test_$i CHARACTER SET utf8mb4 COLLATE utf8mb4_bin;"
          done
          mysql -h 127.0.0.1 -u root -e "ALTER DATABASE rails_js_test CHARACTER SET utf8mb4 COLLATE utf8mb4_bin;"
      - run: pnpm vitest run packages/activerecord
        env:
          MYSQL_TEST_URL: mysql://root@localhost:3306/rails_js_test
          AR_DB_FORKS: 4

  website:
    name: Website
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      (needs.changes.outputs.website_affected == 'true' ||
       needs.changes.outputs.website_label == 'true')
    # Stays on hosted: SvelteKit + VitePress + typedoc build is too slow
    # on the self-hosted box and ties up a runner slot that cheaper jobs
    # could use. Hosted parallelism is free.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache VitePress + Vite build artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/website/docs/.vitepress/cache
            packages/website/node_modules/.vite
          key: vitepress-v1-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/website/docs/.vitepress/config.ts') }}
      - run: pnpm --filter @blazetrails/website exec svelte-kit sync
      - name: Build SvelteKit
        run: pnpm --filter @blazetrails/website run build:sw && pnpm --filter @blazetrails/website exec vite build
      - name: Build docs (typedoc + VitePress)
        run: pnpm --filter @blazetrails/website run docs:build

  rails-comparison:
    name: Rails API/Test Comparison
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Cache vendored upstream Ruby sources
        uses: actions/cache@v4
        with:
          # Cache only the gitignored clones (vendor/*/), not tracked files
          # under vendor/. Caching vendor/ wholesale would restore stale
          # versions of vendor/README.md / fetch.ts / sources.ts on top of
          # the checkout when a PR changes one of those without bumping the
          # cache key.
          path: vendor/*/
          # Invalidates when sources.ts (declared refs) or sources.lock.json
          # (resolved SHAs) change. fetch.ts checksum keeps the cache fresh
          # if the fetcher logic itself changes.
          # Exact-match only — no restore-keys. A partial restore of an older
          # cache would produce a vendor/<source>/.git/HEAD that doesn't match
          # the current sources.lock.json, and vendor/fetch.ts would abort
          # rather than silently re-fetch.
          key: vendor-sources-${{ hashFiles('vendor/sources.ts', 'vendor/sources.lock.json', 'vendor/fetch.ts') }}
      - name: Fetch upstream Ruby sources
        run: pnpm vendor:fetch
      - name: Extract Ruby API
        run: cd scripts/api-compare && LIB_PATHS_JSON=$(pnpm -s -C ../.. vendor:fetch --print-lib-paths) LOCKFILE_PATH=$GITHUB_WORKSPACE/vendor/sources.lock.json ruby extract-ruby-api.rb
      - name: Extract Ruby tests
        run: cd scripts/test-compare && TEST_PATHS_JSON=$(pnpm -s -C ../.. vendor:fetch --print-test-paths) ruby extract-ruby-tests.rb
      - name: API comparison
        run: pnpm exec tsx scripts/api-compare/extract-ts-api.ts && pnpm exec tsx scripts/api-compare/compare.ts
      - name: API comparison (privates)
        run: pnpm exec tsx scripts/api-compare/compare.ts --privates
      - name: Dependency lint
        run: pnpm exec tsx scripts/api-compare/lint-deps.ts
      - name: Rails-private JSDoc lint
        # Needs rails-api.json (extracted above) to enforce
        # blazetrails/rails-private-jsdoc. The standalone Lint job has
        # no Ruby and intentionally no-ops this rule.
        run: pnpm exec tsx scripts/build-rails-privates-manifest.ts && pnpm exec eslint packages/arel/src
      - name: Test comparison
        run: pnpm exec tsx scripts/test-compare/extract-ts-tests.ts && pnpm exec tsx scripts/test-compare/test-compare.ts
      - name: Fixtures comparison (DIFF/MISSING soft per Decision 4 until PR 7; runtime errors hard-fail)
        run: pnpm exec tsx scripts/fixtures-compare/compare.ts --package activerecord

  schema-parity-rails:
    name: Schema Parity (Rails side)
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.parity_sqlite == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Cache bundled gems
        uses: actions/cache@v4
        with:
          path: scripts/parity/schema/ruby/vendor/bundle
          key: ${{ runner.os }}-parity-gems-${{ hashFiles('scripts/parity/schema/ruby/Gemfile', 'scripts/parity/schema/ruby/Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-parity-gems-
      - name: Bundle install
        run: bundle install --jobs 4 --retry 3 --path vendor/bundle
        working-directory: scripts/parity/schema/ruby
      - name: Upload Gemfile.lock artifact (commit this to the repo for stable caching)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-ruby-gemfile-lock
          path: scripts/parity/schema/ruby/Gemfile.lock
          retention-days: 7
      - run: pnpm install --frozen-lockfile
      - name: Run Rails-side dump
        run: pnpm tsx scripts/parity/run.ts --side=rails
      - uses: actions/upload-artifact@v4
        with:
          name: parity-rails-dumps
          path: scripts/parity/.out/rails/
          retention-days: 1

  schema-parity-trails:
    name: Schema Parity (trails side)
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.parity_sqlite == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build dependency packages for trails introspection
        run: pnpm --filter @blazetrails/arel --filter @blazetrails/activesupport --filter @blazetrails/activemodel --filter @blazetrails/globalid build
      - name: Run trails-side dump
        run: pnpm tsx scripts/parity/run.ts --side=trails
      - uses: actions/upload-artifact@v4
        with:
          name: parity-trails-dumps
          path: scripts/parity/.out/trails/
          retention-days: 1

  schema-parity-diff:
    name: Schema Parity (diff)
    needs:
      - changes
      - schema-parity-rails
      - schema-parity-trails
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.parity_sqlite == 'true' &&
      needs.schema-parity-rails.result == 'success' &&
      needs.schema-parity-trails.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: parity-rails-dumps
          path: scripts/parity/.out/rails/
      - uses: actions/download-artifact@v4
        with:
          name: parity-trails-dumps
          path: scripts/parity/.out/trails/
      - name: Diff canonical outputs
        run: pnpm tsx scripts/parity/schema/diff.ts --rails-dir scripts/parity/.out/rails --trails-dir scripts/parity/.out/trails

  query-parity-frozen-at:
    name: Query Parity (compute frozen-at)
    needs: changes
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.parity_sqlite == 'true'
    runs-on: ubuntu-latest
    outputs:
      # Minted once per workflow run and consumed by both dump jobs so they
      # freeze time to the same instant. ISO-8601 UTC with ms precision and
      # trailing Z — matches scripts/parity/canonical/query.schema.json.
      value: ${{ steps.gen.outputs.value }}
    steps:
      - id: gen
        run: |
          ts=$(date -u +"%Y-%m-%dT%H:%M:%S.%3NZ")
          echo "value=$ts" >> "$GITHUB_OUTPUT"
          echo "frozen-at: $ts"

  query-parity-rails:
    name: Query Parity (Rails side)
    needs:
      - changes
      - query-parity-frozen-at
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.parity_sqlite == 'true'
    runs-on: ubuntu-latest
    env:
      PARITY_FROZEN_AT: ${{ needs.query-parity-frozen-at.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Cache bundled gems
        uses: actions/cache@v4
        with:
          path: scripts/parity/schema/ruby/vendor/bundle
          key: ${{ runner.os }}-parity-gems-${{ hashFiles('scripts/parity/schema/ruby/Gemfile', 'scripts/parity/schema/ruby/Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-parity-gems-
      - name: Bundle install
        run: bundle install --jobs 4 --retry 3 --path vendor/bundle
        working-directory: scripts/parity/schema/ruby
      - run: pnpm install --frozen-lockfile
      - name: Run Rails-side query dump
        run: pnpm tsx scripts/parity/run.ts --type=query --side=rails
      - uses: actions/upload-artifact@v4
        with:
          name: parity-query-rails-dumps
          path: scripts/parity/.out/query/rails/
          retention-days: 1

  query-parity-trails:
    name: Query Parity (trails side)
    needs:
      - changes
      - query-parity-frozen-at
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.parity_sqlite == 'true'
    runs-on: ubuntu-latest
    env:
      PARITY_FROZEN_AT: ${{ needs.query-parity-frozen-at.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build dependency packages for trails query runner
        # activerecord is needed for AR-style fixtures (ar-*): ar_dump.ts
        # imports Base from @blazetrails/activerecord and fixture models.ts
        # files do too. Built in dep order — a single `--filter` invocation
        # races (pnpm may start activemodel before activesupport's dist
        # lands), so step through each package explicitly.
        run: |
          pnpm --filter @blazetrails/activesupport build
          pnpm --filter @blazetrails/activemodel build
          pnpm --filter @blazetrails/arel build
          pnpm --filter @blazetrails/globalid build
          pnpm --filter @blazetrails/activerecord build
      - name: Run trails-side query dump
        run: pnpm tsx scripts/parity/run.ts --type=query --side=trails
      - uses: actions/upload-artifact@v4
        with:
          name: parity-query-trails-dumps
          path: scripts/parity/.out/query/trails/
          retention-days: 1

  query-parity-diff:
    name: Query Parity (diff)
    needs:
      - changes
      - query-parity-rails
      - query-parity-trails
    if: >-
      needs.changes.outputs.docs_only != 'true' &&
      needs.changes.outputs.parity_sqlite == 'true' &&
      needs.query-parity-rails.result == 'success' &&
      needs.query-parity-trails.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: parity-query-rails-dumps
          path: scripts/parity/.out/query/rails/
      - uses: actions/download-artifact@v4
        with:
          name: parity-query-trails-dumps
          path: scripts/parity/.out/query/trails/
      - name: Diff canonical query outputs
        run: pnpm tsx scripts/parity/query/diff.ts --rails-dir scripts/parity/.out/query/rails --trails-dir scripts/parity/.out/query/trails

  ci:
    name: CI
    if: ${{ always() }}
    needs:
      - changes
      - build-and-typecheck
      - lint
      - prettier
      - guides-typecheck
      - dx-type-tests
      - virtualized-dx-type-tests
      - unit-tests
      - rack-tests
      - actionpack-tests
      - actionview-tests
      - trailties-tests
      - tse-compiler-tests
      - sqlite-tests
      - postgres-tests
      - mariadb-tests
      - website
      - rails-comparison
      - schema-parity-rails
      - schema-parity-trails
      - schema-parity-diff
      - query-parity-frozen-at
      - query-parity-rails
      - query-parity-trails
      - query-parity-diff
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Fail if any required job failed, was cancelled, or unexpectedly skipped
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
          AR_AFFECTED: ${{ needs.changes.outputs.activerecord_affected }}
          AP_AFFECTED: ${{ needs.changes.outputs.actionpack_affected }}
          AV_AFFECTED: ${{ needs.changes.outputs.actionview_affected }}
          RACK_AFFECTED: ${{ needs.changes.outputs.rack_affected }}
          TRAILTIES_AFFECTED: ${{ needs.changes.outputs.trailties_affected }}
          TRAILS_TSC_AFFECTED: ${{ needs.changes.outputs.trails_tsc_affected }}
          TSE_COMPILER_AFFECTED: ${{ needs.changes.outputs.tse_compiler_affected }}
          UNIT_TESTS_AFFECTED: ${{ needs.changes.outputs.unit_tests_affected }}
          GUIDES_AFFECTED: ${{ needs.changes.outputs.guides_affected }}
          WEBSITE_AFFECTED: ${{ needs.changes.outputs.website_affected }}
          WEBSITE_LABEL: ${{ needs.changes.outputs.website_label }}
          PARITY_SQLITE: ${{ needs.changes.outputs.parity_sqlite }}
          PARITY_POSTGRES: ${{ needs.changes.outputs.parity_postgres }}
          PARITY_MYSQL: ${{ needs.changes.outputs.parity_mysql }}
        run: |
          set -euo pipefail
          echo "$NEEDS_JSON"
          # Hard failures: failure or cancelled.
          bad=$(echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | .key')
          if [ -n "$bad" ]; then
            echo "Failed/cancelled jobs:"
            echo "$bad"
            exit 1
          fi
          # Allow-list jobs that may legitimately skip, conditioned on the
          # gate that produced the skip. Anything else skipping means a gate
          # mis-evaluated and downstream silently passed.
          unexpected=0
          # Docs-only legitimately skips every gated downstream.
          if [ "$DOCS_ONLY" = "true" ]; then
            echo "docs_only=true — all downstream skips are expected."
          else
            any_parity=false
            for v in "$PARITY_SQLITE" "$PARITY_POSTGRES" "$PARITY_MYSQL"; do
              [ "$v" = "true" ] && any_parity=true
            done
            while read -r job result; do
              [ "$result" = "skipped" ] || continue
              case "$job" in
                changes|ci) continue ;;
                sqlite-tests|postgres-tests|mariadb-tests)
                  # AR test skip is legitimate when no AR-affecting paths changed.
                  [ "$AR_AFFECTED" = "false" ] && continue
                  ;;
                actionpack-tests)
                  # Actionpack test skip is legitimate when no actionpack-affecting paths changed.
                  [ "$AP_AFFECTED" = "false" ] && continue
                  ;;
                actionview-tests)
                  [ "$AV_AFFECTED" = "false" ] && continue
                  ;;
                rack-tests)
                  [ "$RACK_AFFECTED" = "false" ] && continue
                  ;;
                trailties-tests)
                  [ "$TRAILTIES_AFFECTED" = "false" ] && continue
                  ;;
                tse-compiler-tests)
                  [ "$TSE_COMPILER_AFFECTED" = "false" ] && continue
                  ;;
                unit-tests)
                  [ "$UNIT_TESTS_AFFECTED" = "false" ] && continue
                  ;;
                guides-typecheck)
                  [ "$GUIDES_AFFECTED" = "false" ] && continue
                  ;;
                website)
                  # Legitimate skip when website_affected is false AND no
                  # website/release label opted the job in.
                  if [ "$WEBSITE_AFFECTED" = "false" ] && [ "$WEBSITE_LABEL" != "true" ]; then
                    continue
                  fi
                  ;;
                dx-type-tests)
                  # Legitimate skip when neither activerecord nor trailties paths changed.
                  if [ "$AR_AFFECTED" = "false" ] && [ "$TRAILTIES_AFFECTED" = "false" ]; then
                    continue
                  fi
                  ;;
                virtualized-dx-type-tests)
                  # Legitimate skip when neither activerecord nor trails-tsc paths changed.
                  if [ "$AR_AFFECTED" = "false" ] && [ "$TRAILS_TSC_AFFECTED" = "false" ]; then
                    continue
                  fi
                  ;;
                schema-parity-rails|schema-parity-trails|schema-parity-diff|\
                query-parity-frozen-at|query-parity-rails|query-parity-trails|query-parity-diff)
                  # Parity skip is legitimate when no parity gate is on.
                  [ "$any_parity" = "false" ] && continue
                  ;;
              esac
              echo "Unexpectedly skipped job: $job (docs_only=$DOCS_ONLY ar_affected=$AR_AFFECTED ap_affected=$AP_AFFECTED av_affected=$AV_AFFECTED rack_affected=$RACK_AFFECTED trailties_affected=$TRAILTIES_AFFECTED trails_tsc_affected=$TRAILS_TSC_AFFECTED tse_compiler_affected=$TSE_COMPILER_AFFECTED unit_tests_affected=$UNIT_TESTS_AFFECTED guides_affected=$GUIDES_AFFECTED website_affected=$WEBSITE_AFFECTED website_label=$WEBSITE_LABEL parity_sqlite=$PARITY_SQLITE parity_postgres=$PARITY_POSTGRES parity_mysql=$PARITY_MYSQL)"
              unexpected=1
            done < <(echo "$NEEDS_JSON" | jq -r 'to_entries[] | "\(.key) \(.value.result)"')
          fi
          [ "$unexpected" -eq 0 ] || exit 1
          echo "All jobs passed or were intentionally skipped."

      # Informational only — never fails the run. Captures peer-job
      # durations from the same workflow run; CI's own duration is excluded
      # because it isn't final at the time of this query.
      - name: Job timing report
        if: ${{ always() }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -uo pipefail
          {
            echo "### Job durations (longest first)"
            echo ""
            echo "| Job | Status | Duration |"
            echo "|-----|--------|----------|"
          } >> "$GITHUB_STEP_SUMMARY"
          if ! gh api --paginate "repos/$REPO/actions/runs/$RUN_ID/jobs" > /tmp/jobs.json; then
            echo "_(timing report unavailable: gh api failed)_" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          jq -r '
            .jobs[]
            | select(.name != "CI")
            | select(.started_at != null and .completed_at != null)
            | [
                ((.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601)),
                .name,
                (.conclusion // "running")
              ]
            | @tsv
          ' /tmp/jobs.json \
            | sort -rn \
            | awk -F'\t' '{
                s=$1; m=int(s/60); r=s-m*60;
                printf("| %s | %s | %dm%02ds |\n", $2, $3, m, r)
              }' >> "$GITHUB_STEP_SUMMARY"
